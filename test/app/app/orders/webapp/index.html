<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Manage Orders</title>
    <script>
        // Collaborative draft requires sap.ushell.Container (FLP shell).
        // Redirect to flpSandbox.html which provides a full FLP environment.
        // Preserves all existing query parameters and adds useFLPUser=true.
        (function () {
            var search = location.search
            if (search.indexOf('useFLPUser=true') === -1) {
                search = search ? search + '&useFLPUser=true' : '?useFLPUser=true'
            }
            location.replace('test/flpSandbox.html' + search + location.hash)
        })()
    </script>
</head>
<body></body>
</html>
